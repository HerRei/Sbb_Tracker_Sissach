<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Installed Swiss Transit Tracker board</title>
  <desc id="desc">A mounted Swiss Transit Tracker display on a red background showing four bright green departure status bars.</desc>
  <defs>
    <linearGradient id="redPanel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ab0016"/>
      <stop offset="0.44" stop-color="#e0001b"/>
      <stop offset="1" stop-color="#6f000d"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1d282e"/>
      <stop offset="0.46" stop-color="#020405"/>
      <stop offset="0.76" stop-color="#263238"/>
      <stop offset="1" stop-color="#050708"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#redPanel)"/>
  <rect width="1600" height="1200" fill="#ffffff" opacity="0.02"/>
  <path d="M52 0 L212 0 L212 1200 L52 1200 Z" fill="#ead8bd"/>
  <path d="M219 0 L254 0 L254 1200 L219 1200 Z" fill="#7d5a39"/>
  <path d="M1275 442 L1600 328 L1600 1167 L1275 1000 Z" fill="#f0f1ee"/>
  <path d="M1342 482 L1600 390 L1600 1105 L1342 973 Z" fill="#dfe2df"/>
  <path d="M0 0 L1600 0 L1600 1200 L0 1200 Z" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="18"/>
  <ellipse cx="872" cy="623" rx="500" ry="132" fill="#000000" opacity="0.26"/>

  <g transform="translate(370 398)" filter="url(#softShadow)">
    <rect x="0" y="0" width="850" height="364" rx="54" fill="#050708"/>
    <rect x="22" y="22" width="806" height="320" rx="38" fill="url(#glass)" stroke="#dcefff" stroke-opacity="0.34" stroke-width="8"/>
    <rect x="55" y="52" width="738" height="260" rx="10" fill="#071017"/>
    <rect x="835" y="139" width="88" height="95" rx="16" fill="#d7d7d2"/>
    <rect x="848" y="158" width="44" height="56" rx="11" fill="#9ea4a5"/>

    <g fill="#040607" stroke="#5a6468" stroke-width="7">
      <circle cx="105" cy="-2" r="17"/>
      <circle cx="167" cy="-2" r="17"/>
      <circle cx="229" cy="-2" r="17"/>
      <circle cx="291" cy="-2" r="17"/>
      <circle cx="353" cy="-2" r="17"/>
      <circle cx="415" cy="-2" r="17"/>
      <circle cx="477" cy="-2" r="17"/>
      <circle cx="539" cy="-2" r="17"/>
      <circle cx="601" cy="-2" r="17"/>
      <circle cx="663" cy="-2" r="17"/>
      <circle cx="725" cy="-2" r="17"/>
    </g>

    <g font-family="Menlo, Consolas, monospace" font-size="46" font-weight="700">
      <g transform="translate(82 70)">
        <text x="0" y="47" fill="#f2fbff">13:57</text>
        <text x="178" y="47" fill="#70adff">IR37</text>
        <rect x="332" y="4" width="383" height="70" rx="5" fill="#16dc42" filter="url(#glow)"/>
      </g>
      <g transform="translate(82 132)">
        <text x="0" y="47" fill="#f2fbff">14:02</text>
        <text x="178" y="47" fill="#70adff">B50</text>
        <rect x="332" y="4" width="383" height="70" rx="5" fill="#19dd42" filter="url(#glow)"/>
      </g>
      <g transform="translate(82 194)">
        <text x="0" y="47" fill="#f2fbff">14:27</text>
        <text x="178" y="47" fill="#70adff">IR27</text>
        <rect x="332" y="4" width="383" height="70" rx="5" fill="#16dc42" filter="url(#glow)"/>
      </g>
      <g transform="translate(82 256)">
        <text x="0" y="47" fill="#f2fbff">14:31</text>
        <text x="178" y="47" fill="#70adff">T8</text>
        <rect x="332" y="4" width="383" height="70" rx="5" fill="#19dd42" filter="url(#glow)"/>
      </g>
    </g>

    <g stroke="#26343a" stroke-width="3">
      <line x1="55" y1="117" x2="793" y2="117"/>
      <line x1="55" y1="179" x2="793" y2="179"/>
      <line x1="55" y1="241" x2="793" y2="241"/>
      <line x1="390" y1="52" x2="390" y2="312"/>
    </g>

    <path d="M43 26 C242 18 482 18 818 44 L806 64 C504 43 265 35 47 48 Z" fill="#ffffff" opacity="0.2"/>
    <path d="M617 38 C704 96 747 178 775 304 C657 282 545 239 449 185 C496 112 552 61 617 38 Z" fill="#ffffff" opacity="0.14"/>
  </g>
</svg>
