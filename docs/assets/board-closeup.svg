<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Close-up Swiss Transit Tracker board</title>
  <desc id="desc">A close-up rendering of the ESP32 departure display on a wooden table with a USB cable attached.</desc>
  <defs>
    <linearGradient id="wood" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8b562b"/>
      <stop offset="0.48" stop-color="#b77739"/>
      <stop offset="1" stop-color="#6d3f22"/>
    </linearGradient>
    <linearGradient id="boardBody" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10181c"/>
      <stop offset="0.36" stop-color="#364145"/>
      <stop offset="0.62" stop-color="#06090b"/>
      <stop offset="1" stop-color="#1a2327"/>
    </linearGradient>
    <linearGradient id="screenShine" x1="0" x2="1" y1="0" y2="0.2">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.32" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <pattern id="grain" width="130" height="86" patternUnits="userSpaceOnUse">
      <path d="M-10 60 C30 35 70 34 140 48" fill="none" stroke="#5d331a" stroke-opacity="0.16" stroke-width="8"/>
      <path d="M0 18 C44 10 76 14 132 4" fill="none" stroke="#e0a66a" stroke-opacity="0.13" stroke-width="5"/>
      <path d="M18 82 C64 58 94 69 128 53" fill="none" stroke="#3a2113" stroke-opacity="0.13" stroke-width="4"/>
    </pattern>
  </defs>

  <rect width="1600" height="1200" fill="url(#wood)"/>
  <rect width="1600" height="1200" fill="url(#grain)" opacity="0.95"/>
  <path d="M0 309 C250 216 430 234 654 172 C856 116 1060 140 1600 16 L1600 0 L0 0 Z" fill="#ffffff" opacity="0.04"/>
  <path d="M0 1011 C312 906 518 967 800 900 C1092 831 1331 852 1600 755 L1600 1200 L0 1200 Z" fill="#1b0f08" opacity="0.15"/>

  <g transform="translate(-70 358) rotate(-10 800 300)">
    <rect x="-128" y="228" width="420" height="130" rx="34" fill="#f1eee6" filter="url(#shadow)"/>
    <rect x="142" y="242" width="190" height="98" rx="20" fill="#bfc4c4"/>
    <rect x="172" y="262" width="120" height="58" rx="12" fill="#8d9496"/>

    <g filter="url(#shadow)">
      <rect x="260" y="58" width="1110" height="514" rx="78" fill="url(#boardBody)"/>
      <rect x="281" y="78" width="1068" height="472" rx="60" fill="#05090c" stroke="#d9edf5" stroke-opacity="0.32" stroke-width="8"/>
      <rect x="326" y="126" width="968" height="382" rx="14" fill="#071015"/>
      <path d="M314 98 C570 84 832 112 1318 126 L1310 156 C818 132 560 116 324 131 Z" fill="#ffffff" opacity="0.18"/>
      <path d="M1058 134 C1166 206 1212 296 1258 484 C1124 470 989 436 856 385 C920 281 987 202 1058 134 Z" fill="#ffffff" opacity="0.22"/>
      <rect x="326" y="126" width="968" height="382" rx="14" fill="url(#screenShine)"/>
    </g>

    <g fill="#050607" stroke="#6b7478" stroke-width="9">
      <circle cx="426" cy="54" r="24"/>
      <circle cx="507" cy="43" r="24"/>
      <circle cx="588" cy="35" r="24"/>
      <circle cx="669" cy="30" r="24"/>
      <circle cx="750" cy="28" r="24"/>
      <circle cx="831" cy="29" r="24"/>
      <circle cx="912" cy="34" r="24"/>
      <circle cx="993" cy="41" r="24"/>
      <circle cx="1074" cy="50" r="24"/>
      <circle cx="1155" cy="62" r="24"/>
      <circle cx="1236" cy="76" r="24"/>
    </g>

    <g font-family="Menlo, Consolas, monospace" font-size="58" font-weight="700">
      <text x="364" y="180" fill="#ff8d89" opacity="0.7">custom filters</text>
      <g transform="translate(356 225)">
        <text x="0" y="60" fill="#dceeff">12:34</text>
        <text x="210" y="60" fill="#70adff">IR27</text>
        <rect x="520" y="14" width="78" height="78" rx="8" fill="#1fe64d"/>
      </g>
      <g transform="translate(356 330)">
        <text x="0" y="60" fill="#dceeff">13:33</text>
        <text x="210" y="60" fill="#70adff">B50</text>
        <rect x="520" y="14" width="78" height="78" rx="8" fill="#65e879"/>
      </g>
      <g transform="translate(356 435)">
        <text x="0" y="60" fill="#dceeff">13:05</text>
        <text x="210" y="60" fill="#70adff">IR37</text>
        <rect x="520" y="14" width="78" height="78" rx="8" fill="#08df3e"/>
      </g>
    </g>

    <g stroke="#223036" stroke-width="3" opacity="0.9">
      <line x1="326" y1="232" x2="1294" y2="232"/>
      <line x1="326" y1="337" x2="1294" y2="337"/>
      <line x1="326" y1="442" x2="1294" y2="442"/>
    </g>
  </g>
</svg>
